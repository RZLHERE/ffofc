<!DOCTYPE html>
<html>
<head>
  <title>RZL 444 YT</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      text-align: center;
      overflow: hidden;

      background: radial-gradient(circle at 20% 30%, rgba(255,0,0,0.4), transparent),
                  radial-gradient(circle at 80% 70%, rgba(0,0,255,0.3), transparent),
                  radial-gradient(circle at 50% 50%, rgba(128,0,255,0.3), transparent),
                  black;

      animation: fade 2s ease-in;
    }

    @keyframes fade {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* PARTICLES */
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: white;
      opacity: 0.3;
      border-radius: 50%;
      animation: float 10s infinite linear;
    }

    @keyframes float {
      from { transform: translateY(100vh); }
      to { transform: translateY(-10vh); }
    }

    header {
      margin-top: 100px;
    }

    .logo {
      width: 130px;
      background: rgba(255,255,255,0.05);
      padding: 10px;
      border-radius: 10px;
    }

    /* GLITCH TITLE */
    h1 {
      font-size: 80px;
      margin: 20px 0;
      animation: glitch 1s infinite;
    }

    @keyframes glitch {
      0% { text-shadow: 3px 3px red; }
      20% { text-shadow: -3px -3px blue; }
      40% { text-shadow: 3px -3px purple; }
      60% { text-shadow: -3px 3px red; }
      80% { text-shadow: 3px 3px blue; }
      100% { text-shadow: -3px -3px purple; }
    }

    /* ABOUT */
    .about {
      margin-top: 50px;
      padding: 20px;
    }

    .about h2 {
      color: red;
      font-size: 30px;
      margin-bottom: 15px;
    }

    .about p {
      max-width: 600px;
      margin: 10px auto;
      color: #ccc;
      line-height: 1.7;
      font-size: 16px;
    }

    /* SOCIAL */
    .social-box {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 60px;
      flex-wrap: wrap;
    }

    .social {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 30px;
      border-radius: 20px;
      border: 1px solid red;
      width: 180px;
      transition: 0.4s;
    }

    .social img {
      width: 70px;
      margin-bottom: 10px;
    }

    .social span {
      font-size: 16px;
      color: #ddd;
    }

    .social:hover {
      transform: scale(1.15);
      background: red;
      box-shadow: 0 0 40px red;
    }

    /* CURSOR GLOW */
    .cursor {
      position: fixed;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: red;
      pointer-events: none;
      mix-blend-mode: difference;
      transform: translate(-50%, -50%);
    }

  </style>
</head>

<body>

<!-- PARTICLES -->
<script>
for(let i=0;i<40;i++){
  let p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"%";
  p.style.animationDuration=(5+Math.random()*5)+"s";
  document.body.appendChild(p);
}
</script>

<!-- CURSOR -->
<div class="cursor" id="cursor"></div>
<script>
document.addEventListener("mousemove", e=>{
  document.getElementById("cursor").style.left=e.clientX+"px";
  document.getElementById("cursor").style.top=e.clientY+"px";
});
</script>

<header>
  <img src="logo.png" class="logo">

  <h1>
    <span style="color:red;">RZL</span>
    <span style="color:white;"> 444 </span>
    <span style="color:blue;">YT</span>
  </h1>
</header>

<!-- ABOUT -->
<div class="about">

  <h2>ABOUT RZL 444 YT</h2>

  <p>
    RZL 444 YT is a Free Fire content creator known for intense gameplay,
    sharp aim, and powerful headshot moments.
  </p>

  <p>
    The channel focuses on high-level gameplay, clutch situations,
    and entertaining content for the Free Fire community.
  </p>

</div>

<!-- SOCIAL -->
<div class="social-box">

  <a href="https://www.instagram.com/rzlffofc/" target="_blank" class="social">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
    <span>@rzlffofc</span>
  </a>

  <a href="https://discord.com/invite/Qjxsjw7WFD" target="_blank" class="social">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
    <span>Join Discord</span>
  </a>

</div>

</body>
</html>
